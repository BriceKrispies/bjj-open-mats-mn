name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Allow only one deployment at a time; cancel in-flight runs on new push.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate icons
        working-directory: frontend
        run: node scripts/gen-icons.mjs

      - name: Build
        working-directory: frontend
        run: npm run build
        # GITHUB_ACTIONS=true is set automatically by the runner.
        # astro.config.mjs reads it to set base: '/bjj-open-mats-mn'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
