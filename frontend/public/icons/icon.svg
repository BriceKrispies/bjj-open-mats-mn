<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a1a"/>
  <!-- Outer ring accent -->
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#2E7D32" stroke-width="8" opacity="0.4"/>
  <!-- Mat octagon shape -->
  <polygon points="256,80 380,140 432,256 380,372 256,432 132,372 80,256 132,140"
    fill="none" stroke="#4CAF50" stroke-width="10" stroke-linejoin="round"/>
  <!-- Inner circle (center of mat) -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#4CAF50" stroke-width="8"/>
  <!-- M letter for mat -->
  <text x="256" y="284" font-family="-apple-system, system-ui, sans-serif"
    font-size="72" font-weight="700" fill="#4CAF50" text-anchor="middle"
    letter-spacing="-2">M</text>
  <!-- Subtle shine -->
  <ellipse cx="256" cy="96" rx="120" ry="30" fill="white" opacity="0.04"/>
</svg>
